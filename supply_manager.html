<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サプライマネージャー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #f8f9fa;
            color: #212529;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
        }

        /* ---- Navbar ---- */
        .navbar-custom {
            background: rgba(255,255,255,.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: .75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: .5rem;
            text-decoration: none;
        }
        .navbar-brand-custom i {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }
        .nav-link-custom {
            color: #2c3e50;
            font-weight: 500;
            padding: .5rem 1rem;
            margin: 0 .25rem;
            border-radius: 8px;
            transition: all .3s ease;
            display: flex;
            align-items: center;
            gap: .5rem;
            text-decoration: none;
        }
        .nav-link-custom:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        .nav-link-custom.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        .nav-link-custom i { font-size: 1.1rem; }

        /* ---- Supply card ---- */
        .playmat-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .15s, border-color .15s, box-shadow .15s;
        }
        .playmat-card:hover {
            transform: translateY(-3px);
            border-color: #adb5bd;
            box-shadow: 0 4px 16px rgba(0,0,0,.15);
        }
        .playmat-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .playmat-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .playmat-body { padding: 10px 12px 12px; }
        .playmat-name {
            font-weight: 600;
            font-size: 0.92rem;
            color: #212529;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .playmat-desc {
            font-size: 0.78rem;
            color: #6c757d;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.2em;
        }
        .playmat-tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }

        /* ---- Modal ---- */
        .modal-content {
            background: #fff;
            border: 1px solid #dee2e6;
            color: #212529;
        }
        .modal-header, .modal-footer { border-color: #dee2e6; }
        .form-control.is-invalid { border-color: #dc3545; }

        /* ---- Image preview ---- */
        .image-preview-area {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #f0f0f0;
            border: 2px dashed #ced4da;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .image-preview-area:hover { border-color: #adb5bd; }
        .image-preview-area img { width: 100%; height: 100%; object-fit: contain; }
        .image-placeholder-text {
            text-align: center;
            color: #adb5bd;
            font-size: 0.85rem;
            pointer-events: none;
        }

        /* ---- Empty state ---- */
        .empty-state {
            text-align: center;
            padding: 72px 24px;
            color: #adb5bd;
        }

        /* ---- Form switch ---- */
        .form-check-input { cursor: pointer; }
        .form-check-label { cursor: pointer; }

        /* ---- Tag management ---- */
        .draggable-tag {
            background: #f8f9fa;
            border: 1px solid #dee2e6 !important;
            border-radius: 6px;
            transition: opacity .15s;
            user-select: none;
        }
        .draggable-tag:hover { border-color: #adb5bd !important; }
        .draggable-tag.dragging { opacity: .35; }
        .draggable-tag.drag-over { border: 2px dashed #667eea !important; }

        .tag-choice-btn {
            font-size: .75rem;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .selected-tag-badges .badge {
            font-size: .7rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

        <div class="container">
            <a class="navbar-brand-custom" href="index.html">
                <i class="bi bi-layers-fill"></i>
                Card Manager
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link-custom" href="index.html">
                            <i class="bi bi-house-door-fill"></i> ホーム
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="card_list.html">
                            <i class="bi bi-list-ul"></i> カード管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="card_gallery.html">
                            <i class="bi bi-grid-3x3-gap-fill"></i> ギャラリー

                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="battle_records.html">
                            <i class="bi bi-trophy-fill"></i> 対戦記録
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom active" href="supply_manager.html">
                            <i class="bi bi-layout-wtf"></i> サプライ
                        </a>
                    </li>
                    <li class="nav-item">

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h6 class="mb-0 text-muted">
                登録済み: <span id="count-badge" class="text-dark fw-bold">0</span> 点
            </h6>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="tag-manage-btn">
                    <i class="bi bi-tags"></i> タグ管理
                </button>
                <button class="btn btn-primary" onclick="openModal(null)">
                    <i class="bi bi-plus-lg"></i> 新規登録
                </button>
            </div>
        </div>

        <div id="playmat-list" class="row g-3"></div>

        <div id="empty-state" class="empty-state" style="display:none;">
            <i class="bi bi-layout-wtf" style="font-size:3.5rem; display:block; margin-bottom:16px; color:#3a3d5a;"></i>
            サプライが登録されていません
            <br>
            <button class="btn btn-primary mt-3" onclick="openModal(null)">最初の1点を登録する</button>
        </div>
    </div>

    <!-- ===================== Add / Edit Modal ===================== -->
    <div class="modal fade" id="playmatModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">サプライを登録</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <!-- 左: 画像 -->
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1">画像</label>
                            <div class="image-preview-area" id="image-preview-area"
                                 onclick="document.getElementById('image-input').click()">
                                <div class="image-placeholder-text" id="image-placeholder">
                                    <i class="bi bi-image" style="font-size:2.2rem; display:block; margin-bottom:8px;"></i>
                                    クリックして画像を選択
                                </div>
                                <img id="image-preview" src="" style="display:none;" alt="preview">
                            </div>
                            <input type="file" id="image-input" accept="image/*"
                                   style="display:none;" onchange="handleImageSelect(event)">
                            <button class="btn btn-outline-secondary btn-sm mt-2 w-100"
                                    id="clear-image-btn" onclick="clearImage()" style="display:none;">
                                <i class="bi bi-x-circle"></i> 画像をクリア
                            </button>
                        </div>
                        <!-- 右: フォーム -->
                        <div class="col-md-6 d-flex flex-column gap-3">
                            <div>
                                <label class="form-label small text-muted mb-1">
                                    名前 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="name-input"
                                       placeholder="サプライ名を入力">
                                <div class="invalid-feedback">名前を入力してください</div>
                            </div>
                            <div>
                                <label class="form-label small text-muted mb-1">詳細</label>
                                <textarea class="form-control" id="desc-input" rows="3"
                                          placeholder="詳細・メモ（任意）"></textarea>
                            </div>
                            <div>
                                <label class="form-label small text-muted d-block mb-1">タグ</label>
                                <div id="modal-selected-tags" class="selected-tag-badges mb-2 d-flex flex-wrap gap-1"></div>
                                <div id="modal-tag-choices" class="d-flex flex-wrap gap-1"></div>
                                <div id="modal-no-tags" class="text-muted" style="font-size:.78rem; display:none;">
                                    タグがありません。「タグ管理」で追加してください。
                                </div>
                            </div>
                            <div>
                                <label class="form-label small text-muted d-block mb-1">状態</label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox"
                                           id="sealed-switch" checked>
                                    <label class="form-check-label" for="sealed-switch"
                                           id="sealed-label">未開封</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger me-auto" id="delete-btn"
                            onclick="deletePlaymat()" style="display:none;">
                        <i class="bi bi-trash"></i> 削除
                    </button>
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
                    <button class="btn btn-primary btn-sm" onclick="savePlaymat()">
                        <i class="bi bi-check-lg"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================== Tag Management Modal ===================== -->
    <div class="modal fade" id="tagModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-tags me-2"></i>タグ管理</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h6 class="small text-muted mb-2">新しいタグを追加</h6>
                    <form id="add-tag-form" class="input-group mb-3">
                        <input type="text" id="new-tag-name" class="form-control"
                               placeholder="タグ名（カンマ区切りで複数入力可）" required>
                        <button class="btn btn-primary" type="submit">追加</button>
                    </form>
                    <hr style="border-color:#3a3d5a;">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div>
                            <h6 class="small text-muted mb-0">登録済みタグ</h6>
                            <small class="text-muted" style="font-size:.72rem;">ドラッグで並び替え可</small>
                        </div>
                        <button class="btn btn-outline-warning btn-sm" id="cleanup-tags-btn">
                            <i class="bi bi-recycle"></i> 未使用をクリーンアップ
                        </button>
                    </div>
                    <div id="existing-tags-list"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">閉じる</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ================================================================
        //  PlaymatDB — IndexedDB wrapper
        // ================================================================
        const PlaymatDB = (() => {
            const DB_NAME = 'PlaymatDB', DB_VERSION = 1, STORE = 'playmats';
            const open = () => new Promise((res, rej) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE))
                        db.createObjectStore(STORE, { keyPath: 'id' });
                };
                req.onsuccess = e => res(e.target.result);
                req.onerror = e => rej(e.target.error);
            });
            const tx = async (mode, fn) => {
                const db = await open();
                return new Promise((res, rej) => {
                    const store = db.transaction(STORE, mode).objectStore(STORE);
                    const req = fn(store);
                    req.onsuccess = () => res(req.result);
                    req.onerror = () => rej(req.error);
                });
            };
            return {
                getAll: () => tx('readonly',  s => s.getAll()),
                save:   item => tx('readwrite', s => s.put(item)),
                delete: id   => tx('readwrite', s => s.delete(id)),
            };
        })();

        // ================================================================
        //  Supply Tags — localStorage wrapper (キー: supplyTags)
        // ================================================================
        const SupplyTags = {
            STORAGE_KEY: 'supplyTags',
            load() {
                try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]'); }
                catch { return []; }
            },
            save(tags) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(tags));
            },
        };

        // ================================================================
        //  State
        // ================================================================
        let playmats = [];
        let editingId = null;
        let currentImageDataUrl = null;
        let currentItemTags = [];   // タグ（編集中アイテム用）
        let allTags = [];           // 全タグ定義
        let bsModal = null;
        let bsTagModal = null;
        let draggedTag = null;

        // ================================================================
        //  Init
        // ================================================================
        async function init() {
            bsModal    = new bootstrap.Modal(document.getElementById('playmatModal'));
            bsTagModal = new bootstrap.Modal(document.getElementById('tagModal'));

            allTags = SupplyTags.load();
            playmats = await PlaymatDB.getAll();
            playmats.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            render();

            // Tag management button
            document.getElementById('tag-manage-btn').addEventListener('click', () => {
                renderTagManagementList();
                bsTagModal.show();
            });

            // Add tag form
            document.getElementById('add-tag-form').addEventListener('submit', e => {
                e.preventDefault();
                const val = document.getElementById('new-tag-name').value.trim();
                if (!val) return;
                const names = val.split(',').map(s => s.trim()).filter(Boolean);
                const dups = [];
                names.forEach(name => {
                    if (allTags.some(t => t.name === name)) { dups.push(name); return; }
                    const maxOrder = allTags.reduce((m, t) => Math.max(m, t.order ?? 0), -1);
                    allTags.push({ id: `st_${Date.now()}_${Math.random().toString(36).slice(2)}`, name, order: maxOrder + 1 });
                });
                if (dups.length) alert(`既に存在するタグ: ${dups.join(', ')}`);
                SupplyTags.save(allTags);
                document.getElementById('new-tag-name').value = '';
                renderTagManagementList();
                renderTagChoices();
            });

            // Tag list event delegation (edit / delete)
            document.getElementById('existing-tags-list').addEventListener('click', e => {
                if (e.target.closest('.edit-tag-btn')) {
                    const btn = e.target.closest('.edit-tag-btn');
                    const id = btn.dataset.id, oldName = btn.dataset.name;
                    const newName = prompt('新しいタグ名を入力してください:', oldName);
                    if (!newName || !newName.trim() || newName.trim() === oldName) return;
                    const trimmed = newName.trim();
                    if (allTags.some(t => t.name === trimmed && t.id !== id)) {
                        alert('このタグ名は既に存在します。');
                        return;
                    }
                    const tag = allTags.find(t => t.id === id);
                    if (tag) {
                        tag.name = trimmed;
                        // update saved supplies
                        playmats.forEach(pm => {
                            if (pm.tags?.includes(oldName)) {
                                pm.tags[pm.tags.indexOf(oldName)] = trimmed;
                                PlaymatDB.save(pm);
                            }
                        });
                        SupplyTags.save(allTags);
                        renderTagManagementList();
                        renderTagChoices();
                        render();
                    }
                    return;
                }
                if (e.target.closest('.delete-tag-btn')) {
                    const btn = e.target.closest('.delete-tag-btn');
                    const id = btn.dataset.id, name = btn.dataset.name;
                    if (!confirm(`タグ「${name}」を削除しますか？\nすべてのサプライからも削除されます。`)) return;
                    allTags = allTags.filter(t => t.id !== id);
                    allTags.forEach((t, i) => t.order = i);
                    playmats.forEach(pm => {
                        if (pm.tags?.includes(name)) {
                            pm.tags = pm.tags.filter(n => n !== name);
                            PlaymatDB.save(pm);
                        }
                    });
                    SupplyTags.save(allTags);
                    renderTagManagementList();
                    renderTagChoices();
                    render();
                }
            });

            // Cleanup unused tags
            document.getElementById('cleanup-tags-btn').addEventListener('click', () => {
                const used = new Set(playmats.flatMap(pm => pm.tags || []));
                const removed = allTags.filter(t => !used.has(t.name)).map(t => t.name);
                if (!removed.length) { alert('未使用タグはありません。'); return; }
                if (!confirm(`以下のタグを削除しますか？\n${removed.join(', ')}`)) return;
                allTags = allTags.filter(t => used.has(t.name));
                allTags.forEach((t, i) => t.order = i);
                SupplyTags.save(allTags);
                renderTagManagementList();
                renderTagChoices();
            });
        }

        // ================================================================
        //  Tag management list render + drag/drop
        // ================================================================
        function renderTagManagementList() {
            const container = document.getElementById('existing-tags-list');
            if (!allTags.length) {
                container.innerHTML = '<p class="text-muted small">タグがありません。</p>';
                return;
            }
            container.innerHTML = '';
            allTags.forEach((tag, index) => {
                const div = document.createElement('div');
                div.className = 'd-flex justify-content-between align-items-center mb-2 p-2 draggable-tag';
                div.draggable = true;
                div.dataset.tagIndex = index;
                div.innerHTML = `
                    <div class="d-flex align-items-center gap-2">
                        <i class="bi bi-grip-vertical text-muted" style="cursor:grab;"></i>
                        <span>${esc(tag.name)}</span>
                        <button class="btn btn-sm btn-link p-0 edit-tag-btn" data-id="${esc(tag.id)}" data-name="${esc(tag.name)}" title="名前を編集">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </div>
                    <button class="btn btn-outline-danger btn-sm delete-tag-btn" data-id="${esc(tag.id)}" data-name="${esc(tag.name)}">削除</button>
                `;
                div.addEventListener('dragstart', e => { draggedTag = div; div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                div.addEventListener('dragend',   () => { div.classList.remove('dragging'); container.querySelectorAll('.draggable-tag').forEach(el => el.classList.remove('drag-over')); });
                div.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
                div.addEventListener('dragenter', e => { if (draggedTag && div !== draggedTag) div.classList.add('drag-over'); });
                div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
                div.addEventListener('drop', e => {
                    e.stopPropagation();
                    div.classList.remove('drag-over');
                    if (!draggedTag || draggedTag === div) return;
                    const from = parseInt(draggedTag.dataset.tagIndex);
                    const to   = parseInt(div.dataset.tagIndex);
                    const [item] = allTags.splice(from, 1);
                    allTags.splice(to, 0, item);
                    allTags.forEach((t, i) => t.order = i);
                    SupplyTags.save(allTags);
                    renderTagManagementList();
                    renderTagChoices();
                });
                container.appendChild(div);
            });
        }

        // ================================================================
        //  Tag choices in add/edit modal
        // ================================================================
        function renderTagChoices() {
            const choicesEl  = document.getElementById('modal-tag-choices');
            const selectedEl = document.getElementById('modal-selected-tags');
            const noTagsEl   = document.getElementById('modal-no-tags');
            if (!allTags.length) {
                choicesEl.innerHTML  = '';
                selectedEl.innerHTML = '';
                noTagsEl.style.display = '';
                return;
            }
            noTagsEl.style.display = 'none';
            choicesEl.innerHTML = allTags.map(tag =>
                `<button type="button"
                    class="btn tag-choice-btn ${currentItemTags.includes(tag.name) ? 'btn-primary' : 'btn-outline-secondary'}"
                    onclick="toggleItemTag('${esc(tag.name)}')">${esc(tag.name)}</button>`
            ).join('');
            selectedEl.innerHTML = currentItemTags.map(name =>
                `<span class="badge bg-primary">${esc(name)}</span>`
            ).join('');
        }

        window.toggleItemTag = name => {
            const i = currentItemTags.indexOf(name);
            i > -1 ? currentItemTags.splice(i, 1) : currentItemTags.push(name);
            renderTagChoices();
        };

        // ================================================================
        //  Render supply list
        // ================================================================
        function render() {
            document.getElementById('count-badge').textContent = playmats.length;
            const list  = document.getElementById('playmat-list');
            const empty = document.getElementById('empty-state');
            if (!playmats.length) {
                list.innerHTML = '';
                empty.style.display = '';
                return;
            }
            empty.style.display = 'none';
            list.innerHTML = playmats.map(pm => `
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="playmat-card" onclick="openModal('${pm.id}')">
                        <div class="playmat-thumb">
                            ${pm.imageDataUrl
                                ? `<img src="${pm.imageDataUrl}" alt="${esc(pm.name)}">`
                                : `<i class="bi bi-image" style="font-size:2.5rem;color:#3a3d5a;"></i>`}
                        </div>
                        <div class="playmat-body">
                            <div class="mb-1">
                                <span class="badge ${pm.sealed ? 'bg-success' : 'bg-warning text-dark'}" style="font-size:.65rem;">
                                    ${pm.sealed ? '未開封' : '開封済み'}
                                </span>
                            </div>
                            <div class="playmat-name">${esc(pm.name)}</div>
                            <div class="playmat-desc">${esc(pm.description || '')}</div>
                            ${(pm.tags?.length)
                                ? `<div class="playmat-tags">${pm.tags.map(t => `<span class="badge bg-secondary" style="font-size:.62rem;">${esc(t)}</span>`).join('')}</div>`
                                : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ================================================================
        //  Modal — open
        // ================================================================
        function openModal(id) {
            editingId = id;
            const pm = id ? playmats.find(p => p.id === id) : null;

            document.getElementById('modal-title').textContent = pm ? 'サプライを編集' : 'サプライを登録';
            document.getElementById('name-input').value = pm?.name ?? '';
            document.getElementById('name-input').classList.remove('is-invalid');
            document.getElementById('desc-input').value = pm?.description ?? '';

            const sealed = pm?.sealed ?? true;
            document.getElementById('sealed-switch').checked = sealed;
            document.getElementById('sealed-label').textContent = sealed ? '未開封' : '開封済み';
            document.getElementById('delete-btn').style.display = pm ? '' : 'none';

            currentItemTags = [...(pm?.tags ?? [])];
            currentImageDataUrl = pm?.imageDataUrl ?? null;
            setImagePreview(currentImageDataUrl);
            renderTagChoices();

            bsModal.show();
        }

        // ================================================================
        //  Image helpers
        // ================================================================
        function setImagePreview(dataUrl) {
            const preview     = document.getElementById('image-preview');
            const placeholder = document.getElementById('image-placeholder');
            const clearBtn    = document.getElementById('clear-image-btn');
            if (dataUrl) {
                preview.src = dataUrl;
                preview.style.display = '';
                placeholder.style.display = 'none';
                clearBtn.style.display = '';
            } else {
                preview.src = '';
                preview.style.display = 'none';
                placeholder.style.display = '';
                clearBtn.style.display = 'none';
            }
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => { currentImageDataUrl = e.target.result; setImagePreview(currentImageDataUrl); };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function clearImage() { currentImageDataUrl = null; setImagePreview(null); }

        document.getElementById('sealed-switch').addEventListener('change', function () {
            document.getElementById('sealed-label').textContent = this.checked ? '未開封' : '開封済み';
        });

        // ================================================================
        //  Save / Delete
        // ================================================================
        async function savePlaymat() {
            const nameEl = document.getElementById('name-input');
            const name = nameEl.value.trim();
            if (!name) { nameEl.classList.add('is-invalid'); return; }
            nameEl.classList.remove('is-invalid');

            const now = new Date().toISOString();
            const pm = {
                id:           editingId ?? crypto.randomUUID(),
                name,
                description:  document.getElementById('desc-input').value.trim(),
                sealed:       document.getElementById('sealed-switch').checked,
                tags:         [...currentItemTags],
                imageDataUrl: currentImageDataUrl,
                createdAt:    editingId ? (playmats.find(p => p.id === editingId)?.createdAt ?? now) : now,
                updatedAt:    now,
            };

            await PlaymatDB.save(pm);
            bsModal.hide();
            playmats = await PlaymatDB.getAll();
            playmats.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            render();
        }

        async function deletePlaymat() {
            if (!editingId) return;
            if (!confirm('このサプライを削除しますか？')) return;
            await PlaymatDB.delete(editingId);
            bsModal.hide();
            playmats = await PlaymatDB.getAll();
            playmats.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            render();
        }

        // ================================================================
        //  Util
        // ================================================================
        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        init();
    </script>
</body>
</html>
