<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バンリストエディター</title>
    <script src="image_cache_manager.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #16213e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* ===== Main App ===== */

        .app-header {
            background: linear-gradient(135deg, #0f3460, #16213e);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #e94560, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .btn-sm {
            padding: 0.4rem 0.9rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-sm:hover { opacity: 0.8; }
        .btn-save   { background: #27ae60; color: white; }
        .btn-reset  { background: #7f8c8d; color: white; }
        .btn-export { background: #2980b9; color: white; }

        /* ===== Tier Table ===== */
        .tier-container { padding: 1rem 1rem 0; }

        .tier-row {
            display: flex;
            min-height: 108px;
            margin-bottom: 4px;
            border-radius: 6px;
            overflow: hidden;
        }
        .tier-label {
            width: 90px;
            min-width: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.05rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            user-select: none;
        }
        .tier-label.kinshi  { background: #c0392b; }
        .tier-label.seigen  { background: #e67e22; }
        .tier-label.jun     { background: #f1c40f; color: #333; }
        .tier-label.kanwa   { background: #27ae60; }

        .tier-cards {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 4px;
            padding: 6px;
            background: #1e2d4a;
            border: 2px solid transparent;
            transition: border-color 0.15s, background 0.15s;
            min-height: 108px;
        }
        .tier-cards.drag-over {
            border-color: #e94560;
            background: #253655;
        }

        /* ===== Card element ===== */
        .tier-card {
            width: 62px;
            height: 90px;
            position: relative;
            cursor: grab;
            border-radius: 3px;
            overflow: visible;
            background: #0a0a1a;
            border: 1px solid #333;
            flex-shrink: 0;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .tier-card:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 14px rgba(0,0,0,0.7);
            z-index: 20;
        }
        .tier-card.dragging { opacity: 0.35; cursor: grabbing; }

        .tier-card .card-inner {
            width: 100%;
            height: 90px;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .tier-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .card-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 1.5rem;
        }
        .card-name-tooltip {
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(10,10,30,0.95);
            color: #eee;
            font-size: 0.72rem;
            padding: 3px 6px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 50;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid #334;
        }
        .tier-card:hover .card-name-tooltip { opacity: 1; }

        .remove-btn {
            position: absolute;
            top: 1px;
            right: 1px;
            width: 16px;
            height: 16px;
            background: rgba(231,76,60,0.9);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 0.6rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }
        .tier-card:hover .remove-btn { display: flex; }

        /* ===== Pool / Search ===== */
        .pool-section { padding: 1rem; }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            align-items: center;
        }
        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        .search-wrap .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 0.5rem 0.8rem 0.5rem 2rem;
            background: #1e2d4a;
            border: 1px solid #334;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: #e94560; }
        .search-input::placeholder { color: #556; }

        .search-stats {
            font-size: 0.78rem;
            color: #667;
            white-space: nowrap;
        }

        #pool-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 8px;
            background: #1e2d4a;
            border-radius: 6px;
            border: 2px solid transparent;
            min-height: 80px;
            transition: border-color 0.15s;
        }
        #pool-cards.drag-over {
            border-color: #27ae60;
            background: #1f3540;
        }
        /* pool cards slightly larger */
        #pool-cards .tier-card      { width: 68px; }
        #pool-cards .tier-card .card-inner { height: 99px; }
        #pool-cards .tier-card      { height: 99px; }

        .pool-empty {
            width: 100%;
            text-align: center;
            color: #445;
            font-size: 0.9rem;
            padding: 1.5rem 0;
        }

        /* ===== Status Bar ===== */
        #status-bar {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #0f3460;
            color: #e0e0e0;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid #e94560;
            max-width: 260px;
            display: none;
            z-index: 200;
        }
        .spin {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid #555;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Export Modal ===== */
        #export-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        #export-modal.show { display: flex; }
        .export-box {
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 10px;
            padding: 1.5rem;
            max-width: 92vw;
            width: 720px;
        }
        .export-box h3 { margin-bottom: 1rem; font-size: 1rem; color: #f5a623; }
        #export-canvas { display: block; max-width: 100%; border-radius: 4px; }
        .export-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; justify-content: flex-end; }
        .btn-dl         { background: #27ae60; color: white; }
        .btn-close-modal{ background: #555; color: white; }
    </style>
</head>
<body>

<!-- Main App -->
<div id="app">
    <div class="app-header">
        <h1>バンリストエディター</h1>
        <div class="header-actions">
            <button class="btn-sm btn-save"   onclick="saveState()">保存</button>
            <button class="btn-sm btn-export" onclick="openExport()">画像出力</button>
            <button class="btn-sm btn-reset"  onclick="resetAll()">リセット</button>
        </div>
    </div>

    <!-- Tier Rows -->
    <div class="tier-container">
        <div class="tier-row">
            <div class="tier-label kinshi">禁止</div>
            <div class="tier-cards" data-tier="禁止" id="tier-禁止"
                 ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label seigen">制限</div>
            <div class="tier-cards" data-tier="制限" id="tier-制限"
                 ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label jun">準制限</div>
            <div class="tier-cards" data-tier="準制限" id="tier-準制限"
                 ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label kanwa">緩和・解除</div>
            <div class="tier-cards" data-tier="緩和・解除" id="tier-緩和・解除"
                 ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"></div>
        </div>
    </div>

    <!-- Pool / Search -->
    <div class="pool-section">
        <div class="search-bar">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="search" class="search-input" id="search-input"
                       placeholder="カード名・よみがなで検索…"
                       oninput="onSearch()" autocomplete="off">
            </div>
            <span class="search-stats" id="search-stats"></span>
        </div>
        <div id="pool-cards"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
            <div class="pool-empty" id="pool-empty">カード名を入力して検索してください</div>
        </div>
    </div>
</div>

<!-- Status Bar -->
<div id="status-bar"></div>

<!-- Export Modal -->
<div id="export-modal">
    <div class="export-box">
        <h3>画像出力</h3>
        <canvas id="export-canvas"></canvas>
        <div class="export-actions">
            <button class="btn-sm btn-dl"          onclick="downloadExport()">ダウンロード</button>
            <button class="btn-sm btn-close-modal" onclick="closeExport()">閉じる</button>
        </div>
    </div>
</div>

<script type="module">
    // ===== State =====
    const cardMap = new Map();        // name -> { cardId, ciid, lang, imageUrl }
    const cardReadingMap = new Map(); // reading -> [cardName, ...]
    const tierState = { "禁止": [], "制限": [], "準制限": [], "緩和・解除": [] };
    let dragItem = null;
    const loadingSet = new Set();

    const TIERS = ["禁止", "制限", "準制限", "緩和・解除"];
    const MAX_RESULTS = 80;

    // ===== Init =====
    async function init() {
        showStatus('マスターデータを読み込み中…');
        await loadCSV();
        loadState();
        renderTiers();
        hideStatus();
    }

    init();

    // ===== CSV loader (same logic as gallery) =====
    async function loadCSV() {
        try {
            const res = await fetch('yugioh_cards_master.csv');
            const text = await res.text();
            const lines = text.split('\n');
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const values = line.split(',');
                const cardId   = values[0]?.replace(/"/g, '');
                const cardName = values[1]?.replace(/"/g, '');
                const reading  = values[2]?.replace(/"/g, '');
                if (!cardId || !cardName) continue;

                cardMap.set(cardName, { cardId, ciid: '1', lang: 'ja', imageUrl: null });

                if (reading) {
                    const readingKey = reading.toLowerCase();
                    if (!cardReadingMap.has(readingKey)) cardReadingMap.set(readingKey, []);
                    cardReadingMap.get(readingKey).push(cardName);

                    // also store hiragana version of katakana reading
                    const hira = katakanaToHiragana(readingKey);
                    if (hira !== readingKey) {
                        if (!cardReadingMap.has(hira)) cardReadingMap.set(hira, []);
                        cardReadingMap.get(hira).push(cardName);
                    }
                }
            }
            console.log(`CSV: ${cardMap.size} cards, ${cardReadingMap.size} readings`);
        } catch (e) {
            console.error('CSV load failed:', e);
        }
    }

    // ===== Search (same logic as gallery) =====
    const normalizeForSearch = (text) => {
        if (!text) return '';
        text = text.toLowerCase();
        // katakana -> hiragana
        text = text.replace(/[ァ-ヶ]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));
        // remove middle dot
        text = text.replace(/・/g, '');
        return text;
    };

    const katakanaToHiragana = (text) =>
        text.replace(/[ァ-ヶ]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));

    function searchCards(query) {
        if (!query) return [];
        const q = query.toLowerCase();
        const normQ = normalizeForSearch(q);

        // Collect candidate names from reading map (exact + partial)
        const readingHits = new Set();
        if (cardReadingMap.has(q)) cardReadingMap.get(q).forEach(n => readingHits.add(n));
        if (cardReadingMap.has(normQ)) cardReadingMap.get(normQ).forEach(n => readingHits.add(n));
        for (const [reading, names] of cardReadingMap) {
            if (reading.includes(q) || reading.includes(normQ)) {
                names.forEach(n => readingHits.add(n));
            }
        }

        const results = [];
        for (const [name] of cardMap) {
            const normName = normalizeForSearch(name);
            if (normName.includes(normQ) || readingHits.has(name)) {
                results.push(name);
                if (results.length >= MAX_RESULTS) break;
            }
        }
        return results;
    }

    // ===== Search handler =====
    window.onSearch = function() {
        const q = document.getElementById('search-input').value.trim();
        renderPool(q);
    };

    // ===== Render =====
    function renderTiers() {
        for (const tier of TIERS) renderTier(tier);
    }

    function renderTier(tier) {
        const el = document.getElementById(`tier-${tier}`);
        if (!el) return;
        el.innerHTML = '';
        for (const name of tierState[tier]) {
            el.appendChild(makeCard(name, tier));
        }
    }

    function renderPool(query) {
        const poolEl = document.getElementById('pool-cards');
        const emptyEl = document.getElementById('pool-empty');
        const statsEl = document.getElementById('search-stats');

        poolEl.innerHTML = '';
        poolEl.appendChild(emptyEl); // keep placeholder in DOM

        if (!query) {
            emptyEl.style.display = 'block';
            statsEl.textContent = '';
            return;
        }

        const assigned = new Set(TIERS.flatMap(t => tierState[t]));
        const hits = searchCards(query).filter(name => !assigned.has(name));

        if (hits.length === 0) {
            emptyEl.textContent = '該当するカードが見つかりませんでした';
            emptyEl.style.display = 'block';
            statsEl.textContent = '';
            return;
        }

        emptyEl.style.display = 'none';
        statsEl.textContent = `${hits.length}件${hits.length >= MAX_RESULTS ? ' (上限)' : ''}`;

        const frag = document.createDocumentFragment();
        for (const name of hits) {
            frag.appendChild(makeCard(name, null));
        }
        poolEl.appendChild(frag);

        // kick off lazy image loads
        poolEl.querySelectorAll('.tier-card[data-needs-img]').forEach(el => {
            queueImageLoad(el.dataset.name);
        });
    }

    function makeCard(name, tier) {
        const card = cardMap.get(name);
        const div = document.createElement('div');
        div.className = 'tier-card';
        div.dataset.name = name;
        div.dataset.tier = tier || '';
        div.draggable = true;

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        if (card?.imageUrl) {
            const img = document.createElement('img');
            img.src = card.imageUrl;
            img.alt = name;
            inner.appendChild(img);
        } else {
            const ph = document.createElement('div');
            ph.className = 'card-ph';
            ph.textContent = '🃏';
            inner.appendChild(ph);
            div.dataset.needsImg = '1';
        }

        div.appendChild(inner);

        const tooltip = document.createElement('div');
        tooltip.className = 'card-name-tooltip';
        tooltip.textContent = name;
        div.appendChild(tooltip);

        if (tier) {
            const rm = document.createElement('button');
            rm.className = 'remove-btn';
            rm.textContent = '×';
            rm.title = '未分類に戻す';
            rm.addEventListener('click', (e) => {
                e.stopPropagation();
                moveCard(name, tier, null);
            });
            div.appendChild(rm);
        }

        div.addEventListener('dragstart', (e) => {
            dragItem = { name, srcTier: tier };
            div.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        div.addEventListener('dragend', () => {
            div.classList.remove('dragging');
            dragItem = null;
        });

        return div;
    }

    // ===== Move card between tiers/pool =====
    function moveCard(name, srcTier, destTier) {
        if (srcTier === destTier) return;
        if (srcTier) tierState[srcTier] = tierState[srcTier].filter(n => n !== name);
        if (destTier && !tierState[destTier].includes(name)) tierState[destTier].push(name);

        if (srcTier) renderTier(srcTier);
        if (destTier) renderTier(destTier);

        // Re-render pool (assigned cards shouldn't show in results)
        const q = document.getElementById('search-input').value.trim();
        renderPool(q);
    }
    window.moveCard = moveCard;

    // ===== Drag & Drop =====
    window.onDragOver = function(e) {
        e.preventDefault();
        e.currentTarget.classList.add('drag-over');
        e.dataTransfer.dropEffect = 'move';
    };
    window.onDragLeave = function(e) { e.currentTarget.classList.remove('drag-over'); };
    window.onDrop = function(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        if (!dragItem) return;
        const destTier = e.currentTarget.dataset.tier || null;
        moveCard(dragItem.name, dragItem.srcTier, destTier);
    };

    // ===== Save / Load =====
    const saveKey = () => 'banlist_v2';

    window.saveState = function() {
        const data = {};
        for (const t of TIERS) data[t] = tierState[t].slice();
        localStorage.setItem(saveKey(), JSON.stringify(data));
        showStatus('保存しました', 1500);
    };

    function loadState() {
        try {
            const raw = localStorage.getItem(saveKey());
            if (!raw) return;
            const data = JSON.parse(raw);
            for (const t of TIERS) {
                if (data[t]) tierState[t] = data[t].filter(n => cardMap.has(n));
            }
        } catch (e) { console.warn('State load failed:', e); }
    }

    window.resetAll = function() {
        if (!confirm('すべての分類をリセットしますか？')) return;
        for (const t of TIERS) tierState[t] = [];
        localStorage.removeItem(saveKey());
        renderTiers();
        onSearch();
    };

    // ===== Lazy image loading =====
    let imgQueueNames = [];
    let imgWorking = false;

    function queueImageLoad(name) {
        const card = cardMap.get(name);
        if (!card || card.imageUrl || loadingSet.has(name)) return;
        imgQueueNames.push(name);
        if (!imgWorking) processImgQueue();
    }

    async function processImgQueue() {
        imgWorking = true;
        while (imgQueueNames.length > 0) {
            const batch = imgQueueNames.splice(0, 6);
            await Promise.all(batch.map(loadImg));
        }
        imgWorking = false;
    }

    async function loadImg(name) {
        const card = cardMap.get(name);
        if (!card || !card.cardId || card.imageUrl) return;
        loadingSet.add(name);
        try {
            const cacheKey = `${card.cardId}_${card.ciid}`;
            let url = await imageCacheManager.getImage(cacheKey);
            if (!url) url = await imageCacheManager.fetchAndCache(cacheKey, card.cardId, card.ciid, card.lang);
            if (url) {
                card.imageUrl = url;
                applyImageToCards(name, url);
            }
        } catch (e) {
            // fallback to direct proxy URL
            const url = `${PROXY_URL}/image?cid=${card.cardId}&ciid=${card.ciid}&locale=${card.lang}`;
            card.imageUrl = url;
            applyImageToCards(name, url);
        } finally {
            loadingSet.delete(name);
        }
    }

    function applyImageToCards(name, url) {
        document.querySelectorAll(`.tier-card[data-name="${CSS.escape(name)}"][data-needs-img]`).forEach(el => {
            const inner = el.querySelector('.card-inner');
            if (!inner) return;
            inner.innerHTML = '';
            const img = document.createElement('img');
            img.src = url;
            img.alt = name;
            inner.appendChild(img);
            delete el.dataset.needsImg;
        });
    }

    // ===== Export =====
    window.openExport = async function() {
        showStatus('画像を生成中…');
        document.getElementById('export-modal').classList.add('show');

        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d');

        const COLORS = { "禁止": "#c0392b", "制限": "#e67e22", "準制限": "#d4ac0d", "緩和・解除": "#27ae60" };
        const LABEL_W = 110;
        const CW = 62, CH = 90, GAP = 4, PAD = 6;
        const W = 1200;

        const rowHeights = TIERS.map(t => {
            const cols = Math.floor((W - LABEL_W - PAD * 2 + GAP) / (CW + GAP));
            const rows = Math.max(1, Math.ceil(tierState[t].length / cols));
            return Math.max(CH + PAD * 2, rows * (CH + GAP) + PAD);
        });
        canvas.width  = W;
        canvas.height = rowHeights.reduce((a, b) => a + b, 0) + (TIERS.length - 1) * 4 + 20;

        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let y = 10;
        for (let ri = 0; ri < TIERS.length; ri++) {
            const tier = TIERS[ri];
            const rh = rowHeights[ri];
            const cards = tierState[tier];

            ctx.fillStyle = COLORS[tier];
            ctx.beginPath(); ctx.roundRect(0, y, LABEL_W, rh, [6, 0, 0, 6]); ctx.fill();

            ctx.fillStyle = tier === '準制限' ? '#333' : '#fff';
            ctx.font = 'bold 15px "Segoe UI", sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(tier, LABEL_W / 2, y + rh / 2);

            ctx.fillStyle = '#1e2d4a';
            ctx.beginPath(); ctx.roundRect(LABEL_W, y, W - LABEL_W, rh, [0, 6, 6, 0]); ctx.fill();

            const cols = Math.floor((W - LABEL_W - PAD * 2 + GAP) / (CW + GAP));
            let cx = LABEL_W + PAD, cy = y + PAD;
            for (let i = 0; i < cards.length; i++) {
                const card = cardMap.get(cards[i]);
                if (card?.imageUrl) {
                    await new Promise(res => {
                        const img = new Image();
                        img.onload = () => { ctx.drawImage(img, cx, cy, CW, CH); res(); };
                        img.onerror = () => { ctx.fillStyle = '#0a0a1a'; ctx.fillRect(cx, cy, CW, CH); res(); };
                        img.src = card.imageUrl;
                    });
                } else {
                    ctx.fillStyle = '#0a0a1a';
                    ctx.fillRect(cx, cy, CW, CH);
                }
                if ((i + 1) % cols === 0) { cx = LABEL_W + PAD; cy += CH + GAP; }
                else cx += CW + GAP;
            }
            y += rh + 4;
        }

        canvas.style.width = '100%';
        hideStatus();
    };
    window.closeExport    = () => document.getElementById('export-modal').classList.remove('show');
    window.downloadExport = () => {
        const a = document.createElement('a');
        a.download = 'banlist.png';
        a.href = document.getElementById('export-canvas').toDataURL('image/png');
        a.click();
    };

    // ===== Util =====
    function showStatus(msg, ms = 0) {
        const el = document.getElementById('status-bar');
        el.innerHTML = `<span class="spin"></span>${msg}`;
        el.style.display = 'block';
        if (ms) setTimeout(hideStatus, ms);
    }
    function hideStatus() { document.getElementById('status-bar').style.display = 'none'; }
</script>
</body>
</html>
